<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictionary — Êdōâma dâ Enêoķe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gray-light: #C8C8C8;
      --amber: #D4A96A;
      --charcoal: #555555;
      --amber-dark: #b8894a;
      --amber-muted: rgba(212, 169, 106, 0.12);
      --bg: #f5f3ef;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --fg-subtle: #999;
      --card-bg: rgba(255,255,255,0.8);
      --card-border: rgba(0,0,0,0.08);
      --nav-bg: rgba(245, 243, 239, 0.92);
      --divider: rgba(0,0,0,0.1);
      --input-bg: #fff;
      --pos-bg: rgba(212,169,106,0.12);
      --pos-color: #8a6030;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1d1b; --fg: #e8e4dc; --fg-muted: #aaa; --fg-subtle: #666;
        --card-bg: rgba(40,38,34,0.8); --card-border: rgba(255,255,255,0.08);
        --nav-bg: rgba(30,29,27,0.92); --divider: rgba(255,255,255,0.08);
        --input-bg: #2a2825; --pos-bg: rgba(212,169,106,0.15); --pos-color: #D4A96A;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Newsreader', Georgia, serif; background: var(--bg); color: var(--fg); line-height: 1.6; overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--divider); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg); text-decoration: none; display: flex; align-items: center; gap: 0.6rem; }
    .nav-logo .dot { width: 8px; height: 8px; background: var(--amber); border-radius: 50%; display: inline-block; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--amber); }

    /* PAGE */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 7rem 2rem 4rem; }
    .page-eyebrow { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); margin-bottom: 0.75rem; }
    .page-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; line-height: 1; margin-bottom: 2rem; }

    /* CONTROLS */
    .controls {
      position: sticky; top: 56px; z-index: 90;
      background: var(--bg);
      padding: 1rem 0;
      border-bottom: 1px solid var(--divider);
      margin-bottom: 2rem;
      display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
    }

    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input {
      width: 100%; padding: 0.65rem 1rem 0.65rem 2.5rem;
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 2px; font-family: 'Newsreader', serif; font-size: 0.95rem;
      color: var(--fg); outline: none; transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--amber); }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--fg-subtle); font-size: 0.9rem; pointer-events: none; }

    .filter-select {
      padding: 0.65rem 1rem; background: var(--input-bg);
      border: 1px solid var(--card-border); border-radius: 2px;
      font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 500;
      color: var(--fg-muted); outline: none; cursor: pointer; transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--amber); }

    .stats { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-subtle); white-space: nowrap; }

    /* LETTER HEADERS */
    .letter-header {
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber);
      padding: 1.5rem 0 0.5rem; border-bottom: 1px solid var(--divider);
      margin-bottom: 0.5rem;
    }

    /* ENTRIES */
    .entry {
      display: grid;
      grid-template-columns: 200px auto 1fr;
      gap: 1rem;
      align-items: baseline;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--divider);
      transition: background 0.15s;
    }
    .entry:hover { background: var(--amber-muted); margin: 0 -1rem; padding: 0.9rem 1rem; border-radius: 2px; }

    .word { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--fg); }
    .ipa { font-size: 0.82rem; color: var(--fg-subtle); font-family: 'Charis SIL', 'Newsreader', serif; margin-top: 0.1rem; }

    .pos {
      font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--pos-bg); color: var(--pos-color);
      padding: 0.2rem 0.6rem; border-radius: 2px; white-space: nowrap;
      align-self: center;
    }

    .meaning { font-size: 0.95rem; color: var(--fg-muted); line-height: 1.5; }

    /* EMPTY / LOADING */
    .state-msg { padding: 3rem 0; text-align: center; color: var(--fg-subtle); font-style: italic; }

    /* FOOTER */
    footer { border-top: 1px solid var(--divider); padding: 2rem; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .footer-left { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-subtle); }
    .footer-right { font-size: 0.82rem; color: var(--fg-subtle); font-style: italic; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .entry { grid-template-columns: 1fr auto; grid-template-rows: auto auto; }
      .entry .word-box { grid-column: 1; }
      .entry .pos { grid-column: 2; grid-row: 1; align-self: start; margin-top: 0.2rem; }
      .entry .meaning { grid-column: 1 / -1; }
      footer { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-logo"><span class="dot"></span>Êdōâma dâ Enêoķe</a>
    <ul class="nav-links">
      <li><a href="https://firebasestorage.googleapis.com/v0/b/ede-archive.firebasestorage.app/o/submissions%2F1773628802748_%C3%AAde.pdf?alt=media&token=44e3e6ac-2d60-4814-94d4-11325b66a67a">Documentation</a></li>
      <li><a href="../dictionary/index.html">Dictionary</a></li>
      <li><a href="../archive/index.html">Archive</a></li>
      <li><a href="../announcements/index.html">Announcements</a></li>
    </ul>
  </nav>

  <div class="page-wrap">
    <p class="page-eyebrow">Reference</p>
    <h1 class="page-title">Dictionary</h1>

    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search word, IPA, or definition…" />
      </div>
      <select class="filter-select" id="posFilter">
        <option value="all">All Parts of Speech</option>
      </select>
      <span class="stats" id="stats">Loading…</span>
    </div>

    <div id="dictionaryDisplay"><div class="state-msg">Loading dictionary…</div></div>
  </div>

  <footer>
    <span class="footer-left">Êdōâma dâ Enêoķe · Dictionary</span>
    <span class="footer-right">created by Nôu F. · language of raccoons</span>
  </footer>

  <script>
    let dictionaryData = {};

    function normalize(str) {
      return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/ķ/g, 'k').replace(/ż/g, 'z').replace(/ģ/g, 'g')
                .replace(/ž/g, 'z').replace(/ǩ/g, 'k').replace(/â/g, 'a')
                .replace(/þ/g, 'th').replace(/ņ/g, 'n').replace(/ā/g, 'a');
    }

    async function loadDictionary() {
      try {
        const response = await fetch('dictionary-en.json');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        dictionaryData = await response.json();
        init();
      } catch (err) {
        document.getElementById('dictionaryDisplay').innerHTML =
          `<div class="state-msg">Could not load dictionary: ${err.message}</div>`;
      }
    }

    function init() {
      const posFilter = document.getElementById('posFilter');
      posFilter.innerHTML = '<option value="all">All Parts of Speech</option>';
      const poses = [...new Set(Object.values(dictionaryData).map(e => e.pos))].sort();
      poses.forEach(pos => {
        const opt = document.createElement('option');
        opt.value = pos; opt.textContent = pos;
        posFilter.appendChild(opt);
      });
      render();
    }

    function render() {
      const query = normalize(document.getElementById('searchInput').value);
      const filter = document.getElementById('posFilter').value;
      const display = document.getElementById('dictionaryDisplay');
      display.innerHTML = '';

      const keys = Object.keys(dictionaryData).filter(word => {
        const entry = dictionaryData[word];
        const matchesSearch = !query ||
          normalize(word).includes(query) ||
          normalize(entry.meaning).includes(query) ||
          entry.ipa.includes(query);
        const matchesPos = filter === 'all' || entry.pos === filter;
        return matchesSearch && matchesPos;
      }).sort((a, b) => normalize(a).localeCompare(normalize(b)));

      document.getElementById('stats').textContent =
        `${keys.length} entr${keys.length === 1 ? 'y' : 'ies'}`;

      if (keys.length === 0) {
        display.innerHTML = '<div class="state-msg">No entries found.</div>';
        return;
      }

      let currentLetter = '';
      keys.forEach(word => {
        const firstLetter = (normalize(word).charAt(0) || '?').toUpperCase();
        if (firstLetter !== currentLetter) {
          currentLetter = firstLetter;
          const h = document.createElement('div');
          h.className = 'letter-header';
          h.textContent = firstLetter;
          display.appendChild(h);
        }

        const entry = dictionaryData[word];
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
          <div class="word-box">
            <div class="word">${word}</div>
            <div class="ipa">${entry.ipa}</div>
          </div>
          <span class="pos">${entry.pos}</span>
          <span class="meaning">${entry.meaning}</span>`;
        display.appendChild(div);
      });
    }

    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('posFilter').addEventListener('change', render);

    loadDictionary();
  </script>
</body>
</html>
